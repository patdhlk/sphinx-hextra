"$schema" = "https://ubcode.useblocks.com/ubproject.schema.json"

# sphinx-needs configuration for the sphinx-hextra demo docs site.
# This file is loaded by conf.py via `needs_from_toml = "ubproject.toml"`.
# Keys under [needs] mirror the Python `needs_*` options with the
# `needs_` prefix removed.

[needs]
id_required = true
id_regex = "^[A-Z]_[A-Z0-9_]{3,}$"

[[needs.types]]
directive = "req"
title = "Requirement"
prefix = "R_"
color = "#BFD8D2"
style = "node"

[[needs.types]]
directive = "spec"
title = "Specification"
prefix = "S_"
color = "#FEDCD2"
style = "node"

[[needs.types]]
directive = "test"
title = "Test Case"
prefix = "T_"
color = "#DF744A"
style = "node"

[[needs.types]]
directive = "impl"
title = "Implementation"
prefix = "I_"
color = "#DCB239"
style = "node"

# In sphinx-needs 8 the legacy `needs_statuses` / `needs_tags` options
# are deprecated. Allowed values for a field are now constrained via
# the field's JSON schema.

[needs.fields.status.schema]
type = "string"
enum = ["open", "in_progress", "implemented", "closed"]

[needs.fields.tags.schema]
type = "array"
[needs.fields.tags.schema.items]
type = "string"
enum = ["theme", "directive", "css"]
